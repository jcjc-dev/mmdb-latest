name: 'Download MMDB Databases'
description: 'Download and extract MMDB database files with retry logic'

inputs:
  provider:
    description: 'Database provider (maxmind or dbip)'
    required: true
  databases:
    description: 'Space-separated list of database names to download'
    required: true
  base-url:
    description: 'Base URL for downloads'
    required: true
  url-suffix:
    description: 'URL suffix pattern. Use {db} for database name, {month} for YYYY-MM'
    required: true
  auth:
    description: 'Authentication (user:password format, optional)'
    required: false
    default: ''
  month:
    description: 'Month in YYYY-MM format (for DB-IP style URLs)'
    required: false
    default: ''
  archive-type:
    description: 'Archive type: tar.gz or gz'
    required: false
    default: 'tar.gz'

outputs:
  download-path:
    description: 'Path to downloaded files'
    value: ${{ steps.download.outputs.path }}
  resolved-month:
    description: 'The actual month used for downloads (may differ from input if current month was not yet available)'
    value: ${{ steps.download.outputs.resolved_month }}

runs:
  using: 'composite'
  steps:
    - name: Download databases
      id: download
      shell: bash
      env:
        PROVIDER: ${{ inputs.provider }}
        DATABASES: ${{ inputs.databases }}
        BASE_URL: ${{ inputs.base-url }}
        URL_SUFFIX: ${{ inputs.url-suffix }}
        AUTH: ${{ inputs.auth }}
        MONTH: ${{ inputs.month }}
        ARCHIVE_TYPE: ${{ inputs.archive-type }}
      run: |
        set -euo pipefail
        
        DOWNLOAD_PATH="downloads/${PROVIDER}"
        mkdir -p "$DOWNLOAD_PATH"
        
        echo "path=${DOWNLOAD_PATH}" >> "$GITHUB_OUTPUT"
        
        # When month-based URLs are used, discover the latest available month
        # via HEAD requests instead of assuming the current month is published.
        if [[ -n "$MONTH" ]]; then
          FIRST_DB=$(echo "$DATABASES" | awk '{print $1}')
          
          probe_month() {
            local month="$1"
            local suffix="${URL_SUFFIX//\{db\}/$FIRST_DB}"
            suffix="${suffix//\{month\}/$month}"
            local url="${BASE_URL}${suffix}"
            local http_code
            http_code=$(curl -sSL -o /dev/null -w '%{http_code}' --head "$url" 2>/dev/null)
            [[ "$http_code" == "200" ]]
          }
          
          CURRENT_MONTH="$MONTH"
          PREV_MONTH=$(date -d "${CURRENT_MONTH}-01 -1 month" '+%Y-%m' 2>/dev/null \
            || date -v-1m -jf '%Y-%m-%d' "${CURRENT_MONTH}-01" '+%Y-%m' 2>/dev/null)
          
          echo "🔍 Probing for latest available month..."
          if probe_month "$CURRENT_MONTH"; then
            echo "✅ Current month ($CURRENT_MONTH) is available"
          elif probe_month "$PREV_MONTH"; then
            echo "⚠️  Current month ($CURRENT_MONTH) not yet available, using previous month ($PREV_MONTH)"
            MONTH="$PREV_MONTH"
          else
            echo "❌ ERROR: Neither current ($CURRENT_MONTH) nor previous ($PREV_MONTH) month available"
            exit 1
          fi
        fi
        
        echo "resolved_month=${MONTH}" >> "$GITHUB_OUTPUT"
        
        download_and_extract() {
          local db="$1"
          local max_attempts=3
          local attempt=1
          
          # Build URL from suffix pattern
          local suffix="${URL_SUFFIX//\{db\}/$db}"
          suffix="${suffix//\{month\}/$MONTH}"
          local url="${BASE_URL}${suffix}"
          
          while [[ $attempt -le $max_attempts ]]; do
            echo "📥 Downloading $db (attempt $attempt/$max_attempts)..."
            
            local curl_opts=(-sSfL --retry 2 --retry-delay 5)
            [[ -n "$AUTH" ]] && curl_opts+=(-u "$AUTH")
            
            local output_file="${DOWNLOAD_PATH}/${db}.archive"
            
            if curl "${curl_opts[@]}" "$url" -o "$output_file"; then
              # Verify file is valid and not empty
              if [[ -s "$output_file" ]] && gzip -t "$output_file" 2>/dev/null; then
                # Extract based on archive type
                if [[ "$ARCHIVE_TYPE" == "tar.gz" ]]; then
                  tar -xzf "$output_file" -C "$DOWNLOAD_PATH" --strip-components=1
                else
                  # For .gz files, rename and gunzip
                  mv "$output_file" "${DOWNLOAD_PATH}/${db}.mmdb.gz"
                  gunzip "${DOWNLOAD_PATH}/${db}.mmdb.gz"
                fi
                rm -f "$output_file"
                echo "✅ Successfully downloaded $db"
                return 0
              fi
            fi
            
            echo "⚠️  Attempt $attempt failed for $db"
            rm -f "$output_file" "${DOWNLOAD_PATH}/${db}.mmdb.gz"
            ((attempt++))
            sleep $((attempt * 5))
          done
          
          echo "❌ ERROR: Failed to download $db after $max_attempts attempts"
          return 1
        }
        
        echo "🚀 Starting download of ${PROVIDER} databases..."
        echo ""
        
        for db in $DATABASES; do
          download_and_extract "$db"
        done
        
        echo ""
        echo "✅ All ${PROVIDER} databases downloaded successfully"
        ls -la "$DOWNLOAD_PATH"/*.mmdb
